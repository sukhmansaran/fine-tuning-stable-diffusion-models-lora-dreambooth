name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Lint & test backend ───────────────────────────────────────────────────
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install deps (CPU-only for CI)
        run: |
          pip install --upgrade pip
          pip install torch==2.1.0+cpu torchvision==0.16.0+cpu \
            --index-url https://download.pytorch.org/whl/cpu
          pip install diffusers==0.28.0 transformers==4.40.0 accelerate==1.0.0 \
            safetensors==0.4.0 Pillow==10.0.0 pyyaml==6.0 \
            fastapi uvicorn pydantic pytest httpx

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check src/ --ignore E501 || true

      - name: Run API smoke tests
        run: pytest tests/ -v --tb=short || true

  # ── Build & test frontend ─────────────────────────────────────────────────
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Install & build
        working-directory: frontend
        run: |
          npm install
          npm run build
